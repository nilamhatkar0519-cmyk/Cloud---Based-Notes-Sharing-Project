<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Notes | Cloud Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="upload-body">

    <!-- Navbar -->
    <nav class="navbar">
        <h2>☁ Cloud Notes</h2>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="loginPage.html">Logout</a>
        </div>
    </nav>

    <!-- Upload Card -->
    <div class="upload-container">
        <h2>📤 Upload Notes</h2>

        <form method="post" enctype="multipart/form-data">

            <div class="upload-group">
                <label>Title</label>
                <input type="text" name="title" placeholder="Enter note title" required>
            </div>

            <div class="upload-group">
                <label>Subject</label>
                <input type="text" name="subject" placeholder="Enter subject name" required>
            </div>

            <div class="upload-group">
                <label>Description</label>
                <textarea name="description" placeholder="Enter description"></textarea>
            </div>

            <div class="upload-group">
                <label>Select File (PDF, DOC, PPT)</label>
                <input type="file" name="file" required>
            </div>

            <button type="submit" class="upload-btn">Upload</button>

        </form>
    </div>

</body>
</html>
