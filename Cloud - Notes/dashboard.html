<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Cloud Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <!-- Navbar -->
    <nav class="navbar">
        <h2>☁ Cloud Notes</h2>
        <div class="nav-links">
            <a href="#">Profile</a>
            <a href="loginPage.html">Logout</a>
        </div>
    </nav>

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h1>What's Your Next Plan?</h1>

    </div>

    <!-- Dashboard Cards -->
    <div class="dashboard-container">

        <div class="card">
            <h3>📤 Upload Notes</h3>
            <p>Add new notes to the cloud.</p>
            <button onclick="location.href='upload.html'">Upload</button>
        </div>

        <div class="card">
            <h3>📚 My Notes</h3>
            <p>View and manage your uploaded notes.</p>
            <button>View</button>
        </div>

        <div class="card">
            <h3>🔍 Search Notes</h3>
            <p>Find notes by subject or title.</p>
            <button>Search</button>
        </div>

        <div class="card">
            <h3>👥 Shared Notes</h3>
            <p>Access notes shared with you.</p>
            <button>Open</button>
        </div>

    </div>

</body>
</html>
