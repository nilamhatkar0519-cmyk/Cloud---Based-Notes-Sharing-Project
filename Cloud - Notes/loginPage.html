<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cloud Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="loginbody">
        <div class="login-container">
            
            <div class="loginPage-card">
                
                <h2>Welcome Back </h2>
                <p class="sub-text">Login to access your notes</p>

                <form>

                    <div class="inputPage-box">
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="inputPage-box">
                        <input type="password" placeholder="Password" required>
                    </div>

                    <div class="optionsPage">
                        <label>
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="loginPage-btn">
                        Login
                    </button>

                    <p class="signup-text">
                        Not a member?
                        <a href="signup.html">Sign Up</a>
                    </p>

                </form>

            </div>

        </div>
    </div>

</body>
</html>
